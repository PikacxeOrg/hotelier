server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect logs from Docker containers via the Docker socket.
  # In Swarm mode containers are named: /hotelier_service-name.replica.taskid
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip leading slash from container name
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Extract service name from hotelier_<service>.<replica>.<taskid> pattern
      - source_labels: ["__meta_docker_container_name"]
        regex: "/hotelier_(.+)\\.\\d+\\.[a-z0-9]+"
        target_label: "service"
      # Also capture swarm service label directly if available
      - source_labels:
          ["__meta_docker_container_label_com_docker_swarm_service_name"]
        regex: "hotelier_(.*)"
        target_label: "service"
      # Only keep hotelier stack containers
      - source_labels: ["service"]
        regex: ".+"
        action: "keep"

  # Host system logs
  - job_name: local-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: local
          __path__: /var/log/*.log
