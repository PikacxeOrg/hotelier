server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect logs from Docker containers via the Docker socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Extract container name without leading slash
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Extract service name from hotelier-<service>-<replica> pattern
      - source_labels: ["__meta_docker_container_name"]
        regex: "/hotelier-(.*)-\\d+"
        target_label: "service"
      # Only keep containers that matched the service label (hotelier services)
      - source_labels: ["service"]
        regex: ".+"
        action: "keep"

  # Host system logs
  - job_name: local-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: local
          __path__: /var/log/*.log
