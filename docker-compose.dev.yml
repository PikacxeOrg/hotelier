services:
  # -------------------------------------------
  # RabbitMQ (Message Broker)
  # -------------------------------------------
  rabbitmq:
    profiles: ["data", "all"]
    image: rabbitmq:3.12-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # PostgreSQL (Database)
  # -------------------------------------------
  postgres:
    profiles: ["data", "all"]
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hotelierdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./etc/postgres/01-create-dbs.sql:/docker-entrypoint-initdb.d/01-create-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # MongoDB
  # -------------------------------------------
  mongodb:
    profiles: ["data", "all"]
    image: mongo:8.0.16-noble
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: hotelierdb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./etc/mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --username ${MONGO_USER} --password ${MONGO_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' --quiet || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.5"]

  # -------------------------------------------
  # Prometheus
  # -------------------------------------------
  prometheus:
    profiles: ["monitoring", "all"]
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/config.yaml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./etc/prometheus/docker-config.yaml:/etc/prometheus/config.yaml:ro
    ports:
      - "9090:9090"
    mem_limit: 512m
    cpus: 1.0

  # -------------------------------------------
  # Grafana
  # -------------------------------------------
  grafana:
    profiles: ["monitoring", "all"]
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    volumes:
      - ./etc/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./etc/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    mem_limit: 4g
    cpus: 4.0

  # -------------------------------------------
  # Loki (Logs)
  # -------------------------------------------
  loki:
    profiles: ["monitoring", "all"]
    image: grafana/loki:2.9.0
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./etc/loki/docker-config.yaml:/etc/loki/config.yaml
      - loki_data:/loki
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # Promtail (Log forwarder)
  # -------------------------------------------
  promtail:
    profiles: ["monitoring", "all"]
    image: grafana/promtail:3.3.0
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./etc/promtail/docker-config.yaml:/etc/promtail/config.yaml
    depends_on:
      - loki
    mem_limit: 256m
    cpus: 1.0

  # -------------------------------------------
  # Jaeger (Distributed Tracing)
  # -------------------------------------------
  jaeger:
    profiles: ["monitoring", "all"]
    image: jaegertracing/all-in-one:1.76.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    mem_limit: 512m
    cpus: 1.0

  # -------------------------------------------
  # Node Exporter (OS Metrics)
  # -------------------------------------------
  node-exporter:
    profiles: ["monitoring", "all"]
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    ports:
      - "9100:9100"
    mem_limit: 128m
    cpus: 0.5

  # -------------------------------------------
  # cAdvisor (Container Metrics)
  # -------------------------------------------
  cadvisor:
    profiles: ["monitoring", "all"]
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    # cgroupv2 requires /dev/kmsg and explicit cgroup mount.
    # Disable metrics that fail silently on cgroupv2 to prevent partial
    # scrapes that make all container panels appear empty in Grafana.
    command:
      - "--housekeeping_interval=10s"
      - "--max_housekeeping_interval=15s"
      - "--disable_metrics=percpu,sched,tcp,udp,hugetlb,referenced_memory,cpu_topology,resctrl,cpuset,memory_numa,advtcp,udp"
      - "--store_container_labels=false"
      - "--allowlisted_container_labels=com.docker.compose.project,com.docker.compose.service,com.docker.compose.container-number"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "8081:8080"
    privileged: true
    mem_limit: 256m
    cpus: 0.5

  # -------------------------------------------
  # Availability Service
  # -------------------------------------------
  availability-service:
    profiles: ["services", "all"]
    build:
      context: ./services/availability-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      ConnectionStrings__Default: "Host=postgres;Database=hotelier_availability;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # Accommodation Service
  # -------------------------------------------
  accommodation-service:
    profiles: ["services", "all"]
    build:
      context: ./services/accommodation-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      ConnectionStrings__Default: "Host=postgres;Database=hotelier_accommodation;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # Identity Service
  # -------------------------------------------
  identity-service:
    profiles: ["services", "all"]
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      ConnectionStrings__Default: "Host=postgres;Database=hotelier_identity;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Services__Reservation: "http://reservation-service:8080"
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      reservation-service:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # Notification Service
  # -------------------------------------------
  notification-service:
    profiles: ["services", "all"]
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      ConnectionStrings__Mongo: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/hotelier_notification?authSource=admin"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5004:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    mem_limit: 512m
    cpus: 1.0

  # -------------------------------------------
  # Rating Service
  # -------------------------------------------
  rating-service:
    profiles: ["services", "all"]
    build:
      context: ./services/rating-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      ConnectionStrings__Default: "Host=postgres;Database=hotelier_rating;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5005:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    mem_limit: 512m
    cpus: 1.0

  # -------------------------------------------
  # Reservation Service
  # -------------------------------------------
  reservation-service:
    profiles: ["services", "all"]
    build:
      context: ./services/reservation-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      ConnectionStrings__Default: "Host=postgres;Database=hotelier_reservation;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
      Services__Availability: "http://availability-service:8080"
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      availability-service:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # Search Service
  # -------------------------------------------
  search-service:
    profiles: ["services", "all"]
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      ConnectionStrings__Mongo: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/hotelier_search?authSource=admin"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5007:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # CDN Service
  # -------------------------------------------
  cdn-service:
    profiles: ["services", "all"]
    build:
      context: ./services/cdn-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      Rabbit__Host: rabbitmq
      Rabbit__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "5008:8080"
    depends_on:
      rabbitmq:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0

  # -------------------------------------------
  # Frontend (React + Nginx)
  # -------------------------------------------
  frontend:
    profiles: ["services", "all"]
    build:
      context: ./web/hotelier-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - identity-service
      - accommodation-service
      - availability-service
      - reservation-service
      - rating-service
      - search-service
      - notification-service
      - cdn-service
    mem_limit: 256m
    cpus: 0.5

volumes:
  postgres_data:
  rabbitmq_data:
  loki_data:
  mongodb_data:
  grafana_data:
