name: Root CI/CD

# This is the umbrella pipeline for the hotelier monorepo.
# Each microservice lives in its own submodule and has its own ci-cd.yml +
# release.yml pipeline that handles unit tests, integration tests, and image builds.
#
# This pipeline is responsible for:
#   1. Validating shared infrastructure configs (docker-compose, helm charts)
#   2. Cross-service integration tests (all services spun up together)
#   3. Tracking submodule health
#
# GitFlow:
#   feature/*  -> validate only
#   develop    -> validate + integration tests
#   main       -> validate + integration tests (stable)

on:
  push:
    branches: [main, develop]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate infrastructure configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          versionSpec: '6.x'
          preferLatestVersion: true

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          useConfigFile: true

      - name: Print version
        run: echo "Version → ${{ steps.gitversion.outputs.semVer }}"

      - name: Validate docker-compose (dev)
        run: docker compose -f docker-compose.dev.yml config --quiet

      - name: Validate docker-compose (swarm)
        run: docker compose -f docker-compose.swarm.yml config --quiet

      - name: Lint Helm charts
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash -s -- --version v3.14.0
          for chart in helm-charts/hotelier-*/; do
            echo "Linting $chart ..."
            helm lint "$chart"
          done

  integration-tests:
    name: Cross-service integration tests
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          versionSpec: '6.x'
          preferLatestVersion: true

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          useConfigFile: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Start shared infra (docker-compose.ci.yml)
        if: hashFiles('docker-compose.ci.yml') != ''
        run: |
          docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for postgres ..."
          timeout 120 bash -c 'until docker compose -f docker-compose.ci.yml ps postgres | grep healthy; do sleep 3; done'
          echo "Waiting for rabbitmq ..."
          timeout 120 bash -c 'until docker compose -f docker-compose.ci.yml ps rabbitmq | grep healthy; do sleep 3; done'
          sleep 5
          docker compose -f docker-compose.ci.yml ps

      - name: Run cross-service integration tests
        if: hashFiles('docker-compose.ci.yml') != ''
        run: |
          projects=(
            "services/accommodation-service/tests/AccommodationService.Tests/AccommodationService.Tests.csproj"
            "services/availability-service/tests/AvailabilityService.Tests/AvailabilityService.Tests.csproj"
            "services/cdn-service/tests/CdnService.Tests/CdnService.Tests.csproj"
            "services/identity-service/tests/IdentityService.Tests/IdentityService.Tests.csproj"
            "services/notification-service/tests/NotificationService.Tests/NotificationService.Tests.csproj"
            "services/rating-service/tests/RatingService.Tests/RatingService.Tests.csproj"
            "services/reservation-service/tests/ReservationService.Tests/ReservationService.Tests.csproj"
            "services/search-service/tests/SearchService.Tests/SearchService.Tests.csproj"
          )
          for proj in "${projects[@]}"; do
            name=$(basename "$proj" .csproj)
            echo "-> $name"
            dotnet test "$proj" \
              -c Release \
              --filter "Category=Integration" \
              --logger trx \
              --results-directory "./coverage-integration/$name"
          done

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-tests
          path: ./coverage-integration

      - name: Tear down infra
        if: always() && hashFiles('docker-compose.ci.yml') != ''
        run: docker compose -f docker-compose.ci.yml down -v
